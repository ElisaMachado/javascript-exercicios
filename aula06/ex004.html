<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    
    <script>
        var nome = window.prompt('Qual é o seu nome?')

        document.write(`Olá ${nome}! Seu nome tem ${nome.length} letras!<br/>`)
        document.write(`Seu nome em maiúsculas é: ${nome.toUpperCase()}<br/>`)
        document.write(`Seu nome em minúsculas é: ${nome.toLowerCase()}<br/>`)

        document.write('<br/>Vamos formatar números agora!<br/>')
        var n1 = 2809.1
        document.write(`Número original: ${n1}<br/>`)

        document.write(`Com 3 casas: ${n1.toFixed(3)}<br/>`)
        document.write(`Com 2 casas e substituindo o ponto por vírgula: <br/>${n1.toFixed(2).replace('.', ',')}<br/>`)
        document.write(`Como dinheiro em reais: ${n1.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'})}<br/>`)
        

    </script>

</body>
</html>
